<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planos por Piso</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 20px;
      background: #f9fafb;
      color: #333;
    }

    h1 {
      text-align: center;
      font-weight: 700;
      font-size: 2.2rem;
      margin-bottom: 40px;
      color: #222;
    }

    .plano-container {
      margin: 0 auto 50px auto;
      max-width: 900px;
      border-radius: 10px;
      box-shadow: 0 6px 15px rgba(0,123,255,0.2);
      background: #ffffff;
      overflow: hidden;
      position: relative;
    }

    .plano-titulo {
      text-align: center;
      font-weight: 700;
      padding: 15px 0;
      background-color: #007BFF;
      color: #fff;
      font-size: 1.5rem;
    }

    .plano-botones {
      text-align: center;
      margin: 10px 0 20px 0;
    }

    .plano-botones button {
      margin: 5px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #007BFF;
      color: white;
    }

    svg {
      display: block;
      margin: 10px auto 0 auto;
      max-width: 100%;
      height: auto;
      background: #f7f9fc;
    }

    .Parqueadero {
      fill: #e2e8f0;
      stroke: #3b82f6;
      stroke-width: 3;
    }

    text {
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<h1>Ubica tu Vehículo</h1>
<div id="contenedor-planos"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
const svgNS = "http://www.w3.org/2000/svg";
const baseUrl = 'https://joalcabadesarrollo.github.io/planos-rutas-qr/';
const entrada = { x: 10, y: 170, width: 60, height: 60 };
const entradaCenter = { x: entrada.x + entrada.width / 2, y: entrada.y + entrada.height / 2 };
const pisos = 3;
const ParqueaderoesPorPiso = 10;
const Parqueaderoes = [];
let haInteraccionado = false;

document.addEventListener('click', () => { haInteraccionado = true; });

for (let piso = 1; piso <= pisos; piso++) {
  for (let i = 1; i <= ParqueaderoesPorPiso; i++) {
    const numeroParqueadero = piso * 100 + i;
    const fila = i <= 5 ? 50 : 250;
    const col = ((i - 1) % 5) * 140 + 100;

    Parqueaderoes.push({
      id: numeroParqueadero,
      piso,
      x: col,
      y: fila,
      width: 120,
      height: 120
    });
  }
}

function createText(x, y, content) {
  const t = document.createElementNS(svgNS, 'text');
  t.setAttribute('x', x);
  t.setAttribute('y', y);
  t.textContent = content;
  t.setAttribute('text-anchor', 'middle');
  return t;
}

function crearLinea(x1, y1, x2, y2) {
  const line = document.createElementNS(svgNS, 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('stroke', '#FF0000');
  line.setAttribute('stroke-width', '3');
  return line;
}

const contenedor = document.getElementById('contenedor-planos');

function crearPlanoParaParqueadero(idParqueadero, piso, placa) {
  const contPlano = document.createElement('div');
  contPlano.classList.add('plano-container');

  const titulo = document.createElement('div');
  titulo.classList.add('plano-titulo');
  titulo.textContent = `Piso ${piso} - Parqueadero ${idParqueadero}`;
  contPlano.appendChild(titulo);

  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 900 400');

  const rectEntrada = document.createElementNS(svgNS, 'rect');
  rectEntrada.setAttribute('x', entrada.x);
  rectEntrada.setAttribute('y', entrada.y);
  rectEntrada.setAttribute('width', entrada.width);
  rectEntrada.setAttribute('height', entrada.height);
  rectEntrada.setAttribute('fill', 'green');
  svg.appendChild(rectEntrada);

  Parqueaderoes.filter(h => h.piso === piso).forEach(h => {
    const rect = document.createElementNS(svgNS, 'rect');
    rect.setAttribute('x', h.x);
    rect.setAttribute('y', h.y);
    rect.setAttribute('width', h.width);
    rect.setAttribute('height', h.height);
    rect.setAttribute('class', 'Parqueadero');
    svg.appendChild(rect);

    const texto = createText(h.x + 60, h.y - 5, h.id);
    svg.appendChild(texto);

    if (h.id === idParqueadero && placa) {
      const textoPlaca = createText(h.x + 60, h.y + 140, `Placa: ${placa}`);
      svg.appendChild(textoPlaca);

      const linea = crearLinea(entradaCenter.x, entradaCenter.y, h.x, h.y);
      svg.appendChild(linea);
    }
  });

  contPlano.appendChild(svg);
  return contPlano;
}

// 🔥 AQUÍ ESTÁ LA INTEGRACIÓN
const params = new URLSearchParams(window.location.search);
const habParam = parseInt(params.get('hab'), 10);
let placaParam = params.get('placa') || '';

// 👉 Solicitar placa si no viene en la URL
if (!placaParam) {
  placaParam = prompt('Por favor ingresa la placa de tu vehículo:') || '';
}

if (!isNaN(habParam)) {
  const piso = Math.floor(habParam / 100);
  contenedor.appendChild(crearPlanoParaParqueadero(habParam, piso, placaParam));
} else {
  for (let piso = 1; piso <= pisos; piso++) {
    Parqueaderoes.filter(h => h.piso === piso).forEach(h => {
      contenedor.appendChild(crearPlanoParaParqueadero(h.id, piso, placaParam));
    });
  }
}
</script>

</body>
</html>
