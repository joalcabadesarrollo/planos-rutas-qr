<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parking QR MVP</title>

<!-- Librería QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

/* ===================== GENERAL ===================== */

body{
  font-family:Arial,sans-serif;
  background:#f3f4f6;
  margin:0;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 0 20px rgba(0,0,0,.1);
}

h1,h2,h3{
  text-align:center;
  margin:0;
}

p{
  margin:5px 0;
}

/* ===================== ENTRADA ===================== */

.entrada{
  background:#111827;
  color:white;
  padding:16px;
  text-align:center;
  border-radius:10px;
  font-weight:bold;
  width:260px;
  margin:0 auto 25px auto;
}

/* ===================== GRID ===================== */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-top:60px;
  position:relative;
  z-index:2;
}

/* ===================== ESPACIOS ===================== */

.espacio{
  background:#bbf7d0;
  padding:20px;
  text-align:center;
  border-radius:14px;
  cursor:pointer;
  font-weight:bold;
  position:relative;
  transition:.2s;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;

  border:2px solid transparent;
}

.espacio:hover{
  transform:scale(1.03);
  background:#86efac;
}

.activo{
  background:#2563eb !important;
  color:white;
  transform:scale(1.03);
  border:2px solid white;
  box-shadow:0 0 15px rgba(37,99,235,.5);
}

/* ===================== MAPA ===================== */

.mapa-container{
  position:relative;
  padding-top:20px;
  min-height:420px;
}

svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  overflow:visible;
  pointer-events:none;
  z-index:1;
}

/* ===================== RUTA ===================== */

.linea-ruta{
  fill:none;
  stroke:#2563eb;
  stroke-width:8;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:14;
  animation:flujo 2s linear infinite;
}

@keyframes flujo{

  from{
    stroke-dashoffset:28;
  }

  to{
    stroke-dashoffset:0;
  }

}

/* ===================== PUNTOS ===================== */

.punto-inicio{
  fill:#111827;
}

.punto-destino{
  fill:#ef4444;
  animation:latido 1s infinite;
}

@keyframes latido{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.2);
  }

  100%{
    transform:scale(1);
  }

}

/* ===================== BOTONES ===================== */

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#1d4ed8;
}

/* ===================== INFO ===================== */

.info{
  margin-top:20px;
  font-size:18px;
  line-height:1.7;
}

.tag{
  padding:14px;
  background:#e5e7eb;
  border-radius:10px;
  margin-top:15px;
  text-align:center;
  font-size:15px;
}

/* ===================== QR ===================== */

.qr-box{
  background:white;
  padding:10px;
  border-radius:10px;
}

</style>

</head>

<body>

<div class="container" id="app"></div>

<script>

/* ===================== ESPACIOS ===================== */

const espacios = [

  {id:'A1', piso:'1', zona:'A'},
  {id:'A2', piso:'1', zona:'A'},
  {id:'A3', piso:'1', zona:'A'},
  {id:'A4', piso:'1', zona:'A'},

  {id:'B1', piso:'2', zona:'B'},
  {id:'B2', piso:'2', zona:'B'},
  {id:'B3', piso:'2', zona:'B'},
  {id:'B4', piso:'2', zona:'B'}

];

/* ===================== URL ===================== */

function obtenerParametroURL(nombre){

  const params = new URLSearchParams(
    window.location.search
  );

  return params.get(nombre);

}

/* ===================== VOZ ===================== */

function hablarRuta(texto){

  if(!('speechSynthesis' in window)){

    alert("Tu navegador no soporta voz");
    return;

  }

  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(texto);

  msg.lang = "es-ES";
  msg.rate = 0.92;
  msg.pitch = 1;

  speechSynthesis.speak(msg);

}

/* ===================== GUARDAR ===================== */

function guardarUbicacion(id){

  const espacio = espacios.find(
    e => e.id === id
  );

  localStorage.setItem('vehiculo', JSON.stringify({

    id:espacio.id,
    piso:espacio.piso,
    zona:espacio.zona,
    hora:new Date().toLocaleString()

  }));

  mostrarConfirmacion(espacio);

}

/* ===================== CONFIRMACIÓN ===================== */

function mostrarConfirmacion(espacio){

  document.getElementById('app').innerHTML = `

    <h1>✅ Vehículo Registrado</h1>

    <div class="info">

      <p><strong>Espacio:</strong> ${espacio.id}</p>
      <p><strong>Piso:</strong> ${espacio.piso}</p>
      <p><strong>Zona:</strong> ${espacio.zona}</p>

    </div>

    <div class="tag">
      📍 Ubicación cargada correctamente mediante QR
    </div>

    <button onclick="verVehiculo()">
      🚗 Ver Mi Vehículo
    </button>

    <button onclick="renderInicio()">
      ⬅️ Volver
    </button>

  `;

}

/* ===================== DETECTAR QR ===================== */

function detectarQR(){

  const espacioQR = obtenerParametroURL('espacio');

  if(!espacioQR){

    renderInicio();
    return;

  }

  const espacio = espacios.find(
    e => e.id === espacioQR
  );

  if(!espacio){

    renderInicio();
    return;

  }

  localStorage.setItem('vehiculo', JSON.stringify({

    id:espacio.id,
    piso:espacio.piso,
    zona:espacio.zona,
    hora:new Date().toLocaleString()

  }));

  mostrarConfirmacion(espacio);

}

/* ===================== COORDENADAS ===================== */

function obtenerCoordenadas(index){

  const columnas = 4;

  const fila = Math.floor(index / columnas);
  const columna = index % columnas;

  return {

    x:(columna * 240) + 120,
    y:(fila * 140) + 170

  };

}

/* ===================== VER VEHÍCULO ===================== */

function verVehiculo(){

  const data = localStorage.getItem('vehiculo');

  if(!data){

    document.getElementById('app').innerHTML = `

      <h1>⚠️ No hay vehículo registrado</h1>

      <button onclick="renderInicio()">
        Ir al parqueadero
      </button>

    `;

    return;

  }

  const vehiculo = JSON.parse(data);

  const indexVehiculo = espacios.findIndex(
    e => e.id === vehiculo.id
  );

  const destino = obtenerCoordenadas(indexVehiculo);

  const origenX = 540;
  const origenY = 30;

  const mitadY = destino.y - 50;

  const path = `
    M ${origenX} ${origenY}
    L ${origenX} ${mitadY}
    L ${destino.x} ${mitadY}
    L ${destino.x} ${destino.y}
  `;

  const rutaTexto = `
    Desde la entrada peatonal,
    avanza por el pasillo principal
    y dirígete al espacio ${vehiculo.id}
    ubicado en el piso ${vehiculo.piso}
  `;

  document.getElementById('app').innerHTML = `

    <h1>🚗 Tu Vehículo</h1>

    <div class="info">

      <p><strong>Espacio:</strong> ${vehiculo.id}</p>
      <p><strong>Piso:</strong> ${vehiculo.piso}</p>
      <p><strong>Zona:</strong> ${vehiculo.zona}</p>
      <p><strong>Hora:</strong> ${vehiculo.hora}</p>

    </div>

    <div class="mapa-container">

      <div class="entrada">
        🚶 Entrada Peatonal
      </div>

      <svg viewBox="0 0 1100 500">

        <!-- Ruta -->

        <path
          class="linea-ruta"
          d="${path}"
        />

        <!-- Punto inicio -->

        <circle
          class="punto-inicio"
          cx="${origenX}"
          cy="${origenY}"
          r="10"
        />

        <!-- Punto destino -->

        <circle
          class="punto-destino"
          cx="${destino.x}"
          cy="${destino.y}"
          r="12"
        />

      </svg>

      <div class="grid">

        ${espacios.map(e=>`

          <div class="espacio
            ${e.id === vehiculo.id ? 'activo' : ''}">

            <h3>${e.id}</h3>

            <p>
              Piso ${e.piso}
            </p>

          </div>

        `).join('')}

      </div>

    </div>

    <div class="tag">
      🛣️ La línea azul representa la mejor ruta peatonal
    </div>

    <button onclick='hablarRuta(${JSON.stringify(rutaTexto)})'>
      🗣️ Iniciar guía por voz
    </button>

    <button onclick="renderInicio()">
      ⬅️ Volver
    </button>

  `;

}

/* ===================== INICIO ===================== */

function renderInicio(){

  document.getElementById('app').innerHTML = `

    <h1>🚗 Parking QR MVP</h1>

    <div class="entrada">
      🚶 ENTRADA PEATONAL
    </div>

    <div class="grid">

      ${espacios.map(e=>`

        <div
          class="espacio"
          onclick="guardarUbicacion('${e.id}')">

          <h3>${e.id}</h3>

          <p>
            Piso ${e.piso}
          </p>

          <div class="qr-box">
            <div id="qr-${e.id}"></div>
          </div>

        </div>

      `).join('')}

    </div>

    <button onclick="verVehiculo()">
      🔍 Ver Mi Vehículo
    </button>

  `;

  /* ===================== GENERAR QR ===================== */

  espacios.forEach(e=>{

    new QRCode(
      document.getElementById(`qr-${e.id}`),
      {

        text:
        `${window.location.origin}${window.location.pathname}?espacio=${e.id}`,

        width:90,
        height:90

      }
    );

  });

}

/* ===================== INICIAR ===================== */

detectarQR();

</script>

</body>

</html>
